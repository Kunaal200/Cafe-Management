packages:
  - "backend"
  - "frontend"
  - "shared"

# pnpm 11 build-script approval: true = run build scripts, false = skip (prebuilt binaries).
allowBuilds:
  "@nestjs/core": true
  "@prisma/client": true
  "@prisma/engines": true
  argon2: true
  prisma: true
  esbuild: true
  "@tailwindcss/oxide": true
  sharp: false
  unrs-resolver: false
