services:
  postgres:
    image: postgres:16-alpine
    container_name: cafe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cafe
      POSTGRES_PASSWORD: cafe_dev_password
      POSTGRES_DB: cafe_management
    ports:
      - "5432:5432"
    volumes:
      - cafe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafe -d cafe_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cafe_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cafe_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cafe_pgdata:
  cafe_redisdata:
